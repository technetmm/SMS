apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lms-ingress
  namespace: lms
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - lms.example.com
      secretName: lms-tls
  rules:
    - host: lms.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lms-app
                port:
                  number: 80
