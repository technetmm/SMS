apiVersion: apps/v1
kind: Deployment
metadata:
  name: lms-app
  namespace: lms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lms-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: lms-app
    spec:
      containers:
        - name: app
          image: ghcr.io/OWNER/REPO:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: lms-config
            - secretRef:
                name: lms-secrets
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
