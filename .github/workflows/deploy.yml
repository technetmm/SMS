name: Vercel Release Gate

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build app
        run: pnpm build

  ready-for-vercel:
    runs-on: ubuntu-latest
    needs:
      - quality-gate
    if: ${{ always() }}
    steps:
      - name: Assert release gates passed
        run: |
          if [[ "${{ needs.quality-gate.result }}" != "success" ]]; then
            echo "quality-gate failed"
            exit 1
          fi
          echo "Release gate passed. Vercel Git integration can proceed with deploy."
