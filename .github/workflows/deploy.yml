name: Vercel Release Gate

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build app
        run: pnpm build

  migration-gate:
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check migration status (production DB)
        env:
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          PRODUCTION_DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
        run: |
          if [ -z "$PRODUCTION_DATABASE_URL" ]; then
            echo "Skipping migration status check because PRODUCTION_DATABASE_URL is not configured."
            echo "Set PRODUCTION_DATABASE_URL (and optional PRODUCTION_DIRECT_URL) repository secrets to enable this gate."
            exit 0
          fi

          export DATABASE_URL="$PRODUCTION_DATABASE_URL"
          export DIRECT_URL="${PRODUCTION_DIRECT_URL:-$PRODUCTION_DATABASE_URL}"
          pnpm db:migrate:status

  ready-for-vercel:
    runs-on: ubuntu-latest
    needs:
      - quality-gate
      - migration-gate
    if: ${{ always() }}
    steps:
      - name: Assert release gates passed
        run: |
          if [[ "${{ needs.quality-gate.result }}" != "success" ]]; then
            echo "quality-gate failed"
            exit 1
          fi
          if [[ "${{ needs.migration-gate.result }}" != "success" && "${{ needs.migration-gate.result }}" != "skipped" ]]; then
            echo "migration-gate failed"
            exit 1
          fi
          echo "Release gate passed. Vercel Git integration can proceed with deploy."
